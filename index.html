// ── Helpers ───────────────────────────────────────────────────────────────────
function getFridayOf(d) { const dt=new Date(d); dt.setHours(0,0,0,0); dt.setDate(dt.getDate()+(5-dt.getDay()+7)%7); return dt; }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d) { return d.toLocaleDateString('en-NZ',{month:'short',day:'numeric'}); }
function fmtIso(d) { return d.toISOString().split('T')[0]; }
function parseIso(s) { const d=new Date(s+'T00:00:00'); d.setHours(0,0,0,0); return d; }
function getWeekNum(d) { const s=new Date(d.getFullYear(),0,1); return Math.ceil(((d-s)/86400000+s.getDay()+1)/7); }
function weekKey(d) { return fmtIso(getFridayOf(d)); }
function nextWeekKey(k) { return weekKey(addDays(parseIso(k),7)); }
function getFridays(offset) { const base=getFridayOf(TODAY); const start=addDays(base,offset*7); return [0,1,2,3,4,5].map(i=>addDays(start,i*7)); }

function useDebouncedCallback(fn, delay) {
  const timer = useRef(null);
  return useCallback((...args) => { clearTimeout(timer.current); timer.current = setTimeout(()=>fn(...args), delay); }, [fn, delay]);
}

// ── People picker — opens upward when near bottom of viewport ─────────────────
function PeoplePicker({ selected, onChange }) {
  const [open, setOpen] = useState(false);
  const [openUp, setOpenUp] = useState(false);
  const ref = useRef(null);
  const triggerRef = useRef(null);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h);
  }, []);

  const handleOpen = () => {
    if (!open && triggerRef.current) {
      const rect = triggerRef.current.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      setOpenUp(spaceBelow < 280); // picker is ~260px tall
    }
    setOpen(o => !o);
  };

  const toggle = name => onChange(selected.includes(name) ? selected.filter(n=>n!==name) : [...selected, name]);

  return (
    <div ref={ref} style={{position:'relative'}}>
      <div ref={triggerRef} onClick={handleOpen} style={{cursor:'pointer',display:'flex',flexWrap:'wrap',gap:3,alignItems:'center',minHeight:24}}>
        {selected.length===0
          ? <span style={{fontSize:'0.72rem',color:'#ccc'}}>Add people…</span>
          : selected.map(n=><span key={n} style={{fontSize:'0.68rem',padding:'1px 6px',borderRadius:20,background:'#e6f1fb',color:'#185FA5',fontWeight:500}}>{n}</span>)
        }
        <span style={{fontSize:'0.68rem',color:'#bbb',marginLeft:2}}>▾</span>
      </div>
      {open && (
        <div style={{
          position:'absolute',
          ...(openUp ? {bottom:'calc(100% + 4px)'} : {top:'calc(100% + 4px)'}),
          left:0, zIndex:200, background:'#fff', border:'0.5px solid #ddd', borderRadius:8,
          boxShadow:'0 4px 16px rgba(0,0,0,0.12)', padding:8, minWidth:180, maxHeight:260, overflowY:'auto'
        }}>
          <div style={{fontSize:'0.68rem',color:'#aaa',marginBottom:6,paddingLeft:2}}>Click to toggle</div>
          {ALL_PEOPLE.map(name=>(
            <div key={name} onClick={()=>toggle(name)} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5,cursor:'pointer',fontSize:'0.8rem',background:selected.includes(name)?'#e6f1fb':'transparent',color:selected.includes(name)?'#185FA5':'#333'}}>

                {selected.includes(name)&&<span style={{color:'#fff',fontSize:9,lineHeight:1}}>✓</span>}

  useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus();},[editing]);

    <div style={{margin:'2px 0',paddingLeft:13}}>
      <input ref={inputRef} value={editVal} onChange={e=>setEditVal(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setEditVal(item.text);setEditing(false);}}} onBlur={save}

// ── Milestone cell ────────────────────────────────────────────────────────────
function MilestoneCell({projectId,projectColor,wk,milestones,onAdd,onComplete,onMoveNext,onEdit,onDelete,isToday}) {
  const [adding,setAdding]=useState(false);
  const [newText,setNewText]=useState('');
  const inputRef=useRef(null);
  const items=milestones[projectId]?.[wk]||[];
  useEffect(()=>{if(adding&&inputRef.current)inputRef.current.focus();},[adding]);
  const commit=()=>{const t=newText.trim();if(t){onAdd(projectId,wk,t);setNewText('');}};
  const handleKeyDown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commit();}if(e.key==='Escape'){commit();setAdding(false);}};
  const handleBlur=()=>{commit();setTimeout(()=>setAdding(false),150);};
  return (
    <td onClick={()=>{if(!adding)setAdding(true);}}
      style={{padding:'6px 6px 8px',borderBottom:'0.5px solid #e5e5e5',verticalAlign:'top',minWidth:145,maxWidth:180,background:isToday?'rgba(0,129,173,0.04)':'transparent',borderLeft:isToday?'2px solid #0081AD':'none',cursor:adding?'default':'text'}}>
      {items.map(item=>(
        <MilestoneItem key={item.id} item={item} projectColor={projectColor}
          onComplete={()=>onComplete(projectId,wk,item.id)} onMoveNext={()=>onMoveNext(projectId,wk,item.id)}
          onEdit={text=>onEdit(projectId,wk,item.id,text)} onDelete={()=>onDelete(projectId,wk,item.id)} />
      ))}
      {adding?(
        <div style={{marginTop:items.length>0?4:0}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',marginTop:7,flexShrink:0,background:projectColor,opacity:0.4}} />
            <input ref={inputRef} value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={handleKeyDown} onBlur={handleBlur} placeholder="Add milestone…"
              style={{flex:1,fontSize:'0.75rem',padding:'2px 0',border:'none',borderBottom:`1.5px solid ${projectColor}`,outline:'none',fontFamily:'inherit',background:'transparent',lineHeight:1.4}} />
          </div>
          <div style={{fontSize:'0.65rem',color:'#bbb',marginTop:3,paddingLeft:10}}>Enter to add · Esc to close</div>
        </div>
      ):items.length===0&&<div style={{fontSize:'0.7rem',color:'#ddd',paddingTop:2,paddingLeft:10}}>+ add milestone</div>}
    </td>
  );
}

  const intensity=maxCount>0?count/maxCount:0;

  const bg=count>0?`${projectColor}${alpha}`:'transparent';
  return (
    <td style={{padding:'4px 6px',borderBottom:'0.5px solid #e5e5e5',textAlign:'center',background:isToday?'rgba(0,129,173,0.04)':'transparent',borderLeft:isToday?'2px solid #0081AD':'none',minWidth:80}}>
      <div style={{background:bg,borderRadius:6,padding:'6px 4px',minHeight:36,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        {count>0&&<><div style={{fontSize:'1rem',fontWeight:500,color:'#fff',textShadow:'0 1px 2px rgba(0,0,0,0.3)'}}>{count}</div><div style={{fontSize:'0.6rem',color:'rgba(255,255,255,0.8)',marginTop:1}}>tickets</div></>}
      </div>
    </td>
  );
}

function MilestoneView({projects,setProjects,milestones,setMilestones}) {
  const [weekOffset,setWeekOffset]=useState(0);
  const [colorPickerFor,setColorPickerFor]=useState(null);
  const [viewMode,setViewMode]=useState('milestones');
  const dragIdx=useRef(null),dragOverIdx=useRef(null);
  const [dragging,setDragging]=useState(null),[dragOver,setDragOver]=useState(null);

  const fridays=getFridays(weekOffset);
  const todayKey=weekKey(TODAY);

  const saveProjects=useCallback(async(ps)=>{await dbSaveProjects(ps);},[]);
  const debouncedSaveProjects=useDebouncedCallback(saveProjects,800);
  const saveMilestonesForProject=useCallback(async(pid,weekData)=>{await dbSaveMilestones(pid,weekData);},[]);
  const debouncedSaveMilestones=useDebouncedCallback(saveMilestonesForProject,800);

  const updateProjects=(updater)=>{
    setProjects(prev=>{const next=typeof updater==='function'?updater(prev):updater;debouncedSaveProjects(next);return next;});
  };
  const updateMilestones=(updater,pid)=>{
    setMilestones(prev=>{const next=typeof updater==='function'?updater(prev):updater;if(pid!==undefined)debouncedSaveMilestones(pid,next[pid]||{});return next;});
  };

  const addMilestone=(pid,wk,text)=>updateMilestones(prev=>({...prev,[pid]:{...(prev[pid]||{}),[wk]:[...(prev[pid]?.[wk]||[]),{id:Date.now()+Math.random(),text,done:false,movedNext:false}]}}),pid);
  const completeMilestone=(pid,wk,id)=>updateMilestones(prev=>({...prev,[pid]:{...prev[pid],[wk]:(prev[pid]?.[wk]||[]).map(m=>m.id===id?{...m,done:!m.done}:m)}}),pid);
  const moveNextMilestone=(pid,wk,id)=>updateMilestones(prev=>{
    const p=prev[pid]||{},item=(p[wk]||[]).find(m=>m.id===id);if(!item)return prev;
    const nk=nextWeekKey(wk);
    return {...prev,[pid]:{...p,[wk]:(p[wk]||[]).map(m=>m.id===id?{...m,movedNext:true}:m),[nk]:[...(p[nk]||[]),{...item,id:Date.now()+Math.random(),movedNext:false}]}};
  },pid);
  const editMilestone=(pid,wk,id,text)=>updateMilestones(prev=>({...prev,[pid]:{...prev[pid],[wk]:(prev[pid]?.[wk]||[]).map(m=>m.id===id?{...m,text}:m)}}),pid);
  const deleteMilestone=(pid,wk,id)=>updateMilestones(prev=>({...prev,[pid]:{...prev[pid],[wk]:(prev[pid]?.[wk]||[]).filter(m=>m.id!==id)}}),pid);

  const maxByProject={};
  projects.forEach(p=>{const d=WEEKLY_COUNTS[p.name]||{};maxByProject[p.id]=Math.max(1,...Object.values(d));});

  const handleDragStart=(e,idx)=>{dragIdx.current=idx;setDragging(idx);const g=document.createElement('div');g.style.cssText='position:absolute;top:-9999px';document.body.appendChild(g);e.dataTransfer.setDragImage(g,0,0);setTimeout(()=>document.body.removeChild(g),0);};
  const handleDragOver=(e,idx)=>{e.preventDefault();if(idx!==dragOverIdx.current){dragOverIdx.current=idx;setDragOver(idx);}};
  const handleDrop=(e,idx)=>{e.preventDefault();const from=dragIdx.current;if(from!==null&&from!==idx){updateProjects(ps=>{const a=[...ps];const[m]=a.splice(from,1);a.splice(idx,0,m);return a;});}dragIdx.current=null;dragOverIdx.current=null;setDragging(null);setDragOver(null);};
  const cleanup=()=>{dragIdx.current=null;dragOverIdx.current=null;setDragging(null);setDragOver(null);};

  return (
    <div style={{padding:16,paddingBottom:220}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <button className="nav-btn" onClick={()=>setWeekOffset(o=>o-6)}>‹‹</button>
        <button className="nav-btn" onClick={()=>setWeekOffset(o=>o-1)}>‹</button>
        <span style={{fontSize:'0.85rem',color:'#666',minWidth:180}}>{fmtDate(addDays(fridays[0],-4))} – {fmtDate(fridays[5])}</span>
        <button className="nav-btn" onClick={()=>setWeekOffset(o=>o+1)}>›</button>
        <button className="nav-btn" onClick={()=>setWeekOffset(o=>o+6)}>››</button>
        <button className="nav-btn" onClick={()=>setWeekOffset(0)} style={{background:'#0081AD',color:'#fff',borderColor:'#0081AD'}}>Today</button>
        <div style={{flex:1}} />
        <div style={{display:'flex',gap:4,background:'#f5f5f3',borderRadius:8,padding:3}}>
          {[['milestones','Milestones'],['heatmap','Ticket heatmap']].map(([m,label])=>(
            <button key={m} className="nav-btn" onClick={()=>setViewMode(m)} style={{padding:'4px 10px',background:viewMode===m?'#fff':'transparent',border:viewMode===m?'0.5px solid #ddd':'none',boxShadow:viewMode===m?'0 1px 2px rgba(0,0,0,0.06)':'none'}}>{label}</button>
          ))}
        </div>
        <button className="nav-btn" onClick={()=>{
          const name=prompt('Project name:');if(!name)return;
          updateProjects(ps=>[...ps,{id:Date.now(),name,people:[],color:PALETTE[ps.length%PALETTE.length],startDate:fmtIso(TODAY),endDate:fmtIso(addDays(TODAY,90))}]);
        }}>+ Add project</button>
      </div>

      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.8rem'}}>
          <thead>
            <tr>
              <th className="col-head" style={{width:32,padding:'6px 0'}}></th>
              <th className="col-head" style={{width:28,padding:'6px 4px',textAlign:'center'}}>#</th>
              <th className="col-head" style={{minWidth:160}}>Project</th>
              <th className="col-head" style={{minWidth:160}}>People</th>
              {fridays.map(fri=>{const k=fmtIso(fri),isNow=k===todayKey;return(
                <th key={k} className="col-head" style={{minWidth:viewMode==='milestones'?150:90,textAlign:'center',background:isNow?'rgba(0,129,173,0.06)':'#f8f8f6',borderLeft:isNow?'2px solid #0081AD':'none'}}>
                  Fri {fmtDate(fri)}<br/><span style={{fontWeight:400,opacity:0.6,fontSize:'0.68rem'}}>Wk {getWeekNum(fri)}</span>
                </th>
              );})}
              <th className="col-head" style={{width:30}}></th>
            </tr>
          </thead>
          <tbody>
            {projects.map((p,idx)=>{
              const counts=WEEKLY_COUNTS[p.name]||{},max=maxByProject[p.id];
              const isDraggingThis=dragging===idx,isDropTarget=dragOver===idx&&dragging!==idx;
              return (
                <tr key={p.id} draggable onDragStart={e=>handleDragStart(e,idx)} onDragOver={e=>handleDragOver(e,idx)} onDrop={e=>handleDrop(e,idx)} onDragEnd={cleanup}
                  style={{opacity:isDraggingThis?0.3:1,background:isDropTarget?'rgba(0,129,173,0.05)':'transparent',borderTop:isDropTarget?'2px solid #0081AD':'2px solid transparent',transition:'background 0.1s'}}>
                  <td style={{padding:0,borderBottom:'0.5px solid #e5e5e5',verticalAlign:'middle',width:32}}><DragHandle /></td>
                  <td style={{padding:'6px 4px',borderBottom:'0.5px solid #e5e5e5',verticalAlign:'top',textAlign:'center'}}>
                    <span style={{fontSize:'0.75rem',fontWeight:500,color:'#bbb'}}>{idx+1}</span>
                  </td>
                  <td style={{padding:'8px',borderBottom:'0.5px solid #e5e5e5',verticalAlign:'top'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:12,height:12,borderRadius:'50%',background:p.color,cursor:'pointer',border:'1.5px solid rgba(0,0,0,0.1)',flexShrink:0}}
                        onClick={()=>setColorPickerFor(colorPickerFor===p.id?null:p.id)} title="Change colour" />
                      <span style={{fontWeight:500}}>{p.name}</span>
                    </div>
                    {colorPickerFor===p.id&&(
                      <div style={{display:'flex',gap:5,marginTop:6,flexWrap:'wrap',paddingLeft:20}}>
                        {PALETTE.map(c=><div key={c} style={{width:16,height:16,borderRadius:'50%',background:c,cursor:'pointer',border:p.color===c?'2px solid #222':'2px solid transparent'}}
                          onClick={()=>{updateProjects(ps=>ps.map(x=>x.id===p.id?{...x,color:c}:x));setColorPickerFor(null);}} />)}
                      </div>
                    )}
                  </td>
                  <td style={{padding:'8px',borderBottom:'0.5px solid #e5e5e5',verticalAlign:'top',minWidth:160}}>
                    <PeoplePicker selected={p.people||[]} onChange={people=>updateProjects(ps=>ps.map(x=>x.id===p.id?{...x,people}:x))} />
                  </td>
                  {fridays.map(fri=>{const k=fmtIso(fri),isNow=k===todayKey;
                    if(viewMode==='heatmap') return <HeatCell key={k} count={counts[k]||0} maxCount={max} projectColor={p.color} isToday={isNow} />;
                    return <MilestoneCell key={k} projectId={p.id} projectColor={p.color} wk={k} milestones={milestones} onAdd={addMilestone} onComplete={completeMilestone} onMoveNext={moveNextMilestone} onEdit={editMilestone} onDelete={deleteMilestone} isToday={isNow} />;
                  })}
                  <td style={{padding:'4px',borderBottom:'0.5px solid #e5e5e5',verticalAlign:'top',textAlign:'center'}}>
                    <button onClick={async()=>{await dbDeleteProject(p.id);updateProjects(ps=>ps.filter(x=>x.id!==p.id));}} style={{background:'none',border:'none',color:'#ccc',fontSize:'0.9rem',cursor:'pointer'}}>✕</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:14,display:'flex',gap:12,fontSize:'0.72rem',color:'#bbb',flexWrap:'wrap',alignItems:'center'}}>
        <span>☰ Drag rows to reorder by priority</span>
        <span>· Click any cell to add milestones · Enter to add each one</span>
        <span>· Hover a milestone: <span style={{color:'#1D9E75'}}>✓</span> complete · <span style={{color:'#185FA5'}}>→</span> next week · <span style={{color:'#888'}}>✎</span> edit · <span style={{color:'#E24B4A'}}>✕</span> delete</span>
      </div>
    </div>
  );
}

// ── Gantt view ────────────────────────────────────────────────────────────────
function GanttView({projects,setProjects}) {
  const [editingId,setEditingId]=useState(null);
  const [editStart,setEditStart]=useState('');
  const [editEnd,setEditEnd]=useState('');
  const ganttStart=new Date(TODAY.getFullYear(),TODAY.getMonth()-2,1);
  const ganttEnd=new Date(TODAY.getFullYear(),TODAY.getMonth()+10,0);
  const totalDays=Math.round((ganttEnd-ganttStart)/86400000);
  const months=[];let cur=new Date(ganttStart);
  while(cur<=ganttEnd){months.push(new Date(cur.getFullYear(),cur.getMonth(),1));cur.setMonth(cur.getMonth()+1);}
  const pct=d=>Math.max(0,Math.min(100,((d-ganttStart)/86400000/totalDays*100)));
  const todayPct=pct(TODAY);
  const editing=projects.find(p=>p.id===editingId);
  const saveAndUpdate=async(updater)=>{setProjects(prev=>{const next=updater(prev);dbSaveProjects(next);return next;});};
  return (
    <div style={{padding:16,paddingBottom:220}}>
      <div style={{fontSize:'0.8rem',color:'#888',marginBottom:12}}>Projects shown in priority order · Click any bar to edit its dates</div>
      {editingId&&editing&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.35)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'}}
          onClick={e=>{if(e.target===e.currentTarget)setEditingId(null);}}>
          <div style={{background:'#fff',borderRadius:12,border:'0.5px solid #ddd',padding:24,minWidth:300}}>
            <div style={{fontWeight:500,fontSize:'0.9rem',marginBottom:16}}>Edit: {editing.name}</div>
            <label style={{fontSize:'0.8rem',color:'#666',display:'block',marginBottom:4}}>Start date</label>
            <input type="date" value={editStart} onChange={e=>setEditStart(e.target.value)} style={{width:'100%',marginBottom:12,padding:'6px 8px',border:'0.5px solid #ccc',borderRadius:6}} />
            <label style={{fontSize:'0.8rem',color:'#666',display:'block',marginBottom:4}}>Target completion</label>
            <input type="date" value={editEnd} onChange={e=>setEditEnd(e.target.value)} style={{width:'100%',marginBottom:16,padding:'6px 8px',border:'0.5px solid #ccc',borderRadius:6}} />
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="nav-btn" onClick={()=>setEditingId(null)}>Cancel</button>
              <button className="nav-btn" onClick={()=>{saveAndUpdate(ps=>ps.map(p=>p.id===editingId?{...p,startDate:editStart,endDate:editEnd}:p));setEditingId(null);}} style={{background:'#0081AD',color:'#fff',borderColor:'#0081AD'}}>Save</button>
            </div>
          </div>
        </div>
      )}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.78rem',minWidth:700}}>
          <thead>
            <tr>
              <th className="col-head" style={{width:28,textAlign:'center'}}>#</th>
              <th className="col-head" style={{minWidth:150}}>Project</th>
              <th className="col-head" style={{minWidth:120}}>People</th>
              <th className="col-head" style={{padding:0}}>
                <div style={{display:'grid',gridTemplateColumns:months.map(m=>`${new Date(m.getFullYear(),m.getMonth()+1,0).getDate()}fr`).join(' ')}}>
                  {months.map(m=><div key={m.toISOString()} style={{textAlign:'center',padding:'5px 2px',fontSize:'0.68rem',fontWeight:500,background:'#f8f8f6'}}>
                    {m.toLocaleDateString('en-NZ',{month:'short'})}<br/><span style={{fontWeight:400,opacity:0.6}}>{m.getFullYear()}</span>
                  </div>)}
                </div>
              </th>
              <th className="col-head" style={{minWidth:100}}>Target</th>
            </tr>
          </thead>
          <tbody>
            {projects.map((p,idx)=>{
              const start=parseIso(p.startDate),end=parseIso(p.endDate);
              const left=pct(start),width=Math.max(0.5,pct(end)-left);
              const overdue=end<TODAY;
              const endStr=end.toLocaleDateString('en-NZ',{month:'short',day:'numeric',year:'numeric'});
              return (
                <tr key={p.id}>
                  <td style={{padding:'6px 4px',borderBottom:'0.5px solid #e5e5e5',textAlign:'center'}}><span style={{fontSize:'0.75rem',fontWeight:500,color:'#bbb'}}>{idx+1}</span></td>
                  <td style={{padding:'6px 8px',borderBottom:'0.5px solid #e5e5e5'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:p.color,flexShrink:0}} />
                      <span style={{fontWeight:500}}>{p.name}</span>
                    </div>
                  </td>
                  <td style={{padding:'6px 8px',borderBottom:'0.5px solid #e5e5e5'}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                      {(p.people||[]).slice(0,4).map(n=><span key={n} style={{fontSize:'0.68rem',padding:'1px 5px',borderRadius:20,background:'#e6f1fb',color:'#185FA5'}}>{n}</span>)}
                      {(p.people||[]).length>4&&<span style={{fontSize:'0.68rem',color:'#aaa'}}>+{p.people.length-4}</span>}
                    </div>
                  </td>
                  <td style={{padding:'4px 0',borderBottom:'0.5px solid #e5e5e5',position:'relative',height:36}}>
                    <div style={{position:'relative',height:28,margin:'0 4px'}}>
                      <div style={{position:'absolute',left:`${left}%`,width:`${width}%`,height:20,top:4,borderRadius:3,background:overdue?'#A32D2D':p.color,opacity:overdue?0.7:1,display:'flex',alignItems:'center',padding:'0 6px',fontSize:'0.68rem',color:'rgba(255,255,255,0.9)',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',cursor:'pointer'}}
                        onClick={()=>{setEditingId(p.id);setEditStart(p.startDate);setEditEnd(p.endDate);}}>
                        {width>8?p.name.split(' ')[0]:''}
                      </div>
                      <div style={{position:'absolute',left:`${todayPct}%`,top:0,bottom:0,width:1.5,background:'#E24B4A',opacity:0.7,pointerEvents:'none'}} />
                    </div>
                  </td>
                  <td style={{padding:'6px 8px',borderBottom:'0.5px solid #e5e5e5',whiteSpace:'nowrap',color:overdue?'#A32D2D':'inherit'}}>
                    {overdue&&'⚠ '}{endStr}
                    <button onClick={()=>{setEditingId(p.id);setEditStart(p.startDate);setEditEnd(p.endDate);}} style={{background:'none',border:'none',cursor:'pointer',color:'#bbb',marginLeft:4}}>✎</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState('milestone');
  const [projects,setProjects]=useState(DEFAULT_PROJECTS);
  const [milestones,setMilestones]=useState({});
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);

  useEffect(()=>{
    (async()=>{
      try {
        const [dbProjects,dbMilestones]=await Promise.all([dbGetProjects(),dbGetMilestones()]);
        if(dbProjects&&dbProjects.length>0) setProjects(dbProjects.map(({_order,...p})=>p));
        if(dbMilestones) setMilestones(dbMilestones);
      } catch(e) { setError('Could not connect to database.'); }
      setLoading(false);
    })();
  },[]);

  if(loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}>
      <div style={{width:40,height:40,background:'#0081AD',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{color:'#fff',fontSize:'1rem',fontWeight:500}}>wg</span>
      </div>
      <div style={{fontSize:'0.9rem',color:'#888'}}>Loading your projects…</div>
    </div>
  );

  return (
    <div style={{fontFamily:'system-ui,-apple-system,sans-serif',minHeight:'100vh',background:'#fff'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'0.5px solid #e5e5e5'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,background:'#0081AD',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{color:'#fff',fontSize:'0.9rem',fontWeight:500}}>wg</span>
          </div>
          <div>
            <div style={{fontSize:'0.95rem',fontWeight:500}}>wisegroup.</div>
            <div style={{fontSize:'0.72rem',color:'#888'}}>IS project tracker</div>
          </div>
          {error&&<span style={{fontSize:'0.75rem',color:'#E24B4A',marginLeft:8}}>⚠ {error}</span>}
        </div>
        <div style={{display:'flex',gap:6}}>
          {[['milestone','⊞ Milestones'],['gantt','▬ Gantt']].map(([t,label])=>(
            <button key={t} className="nav-btn" onClick={()=>setTab(t)} style={{background:tab===t?'#0081AD':'transparent',color:tab===t?'#fff':'#555',borderColor:tab===t?'#0081AD':'#ccc'}}>{label}</button>
          ))}
        </div>
      </div>
      {tab==='milestone'
        ?<MilestoneView projects={projects} setProjects={setProjects} milestones={milestones} setMilestones={setMilestones} />
        :<GanttView projects={projects} setProjects={setProjects} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
